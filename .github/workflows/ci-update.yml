name: '[CI/CD] CI Update'
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
jobs:
  get-chart:
    runs-on: ubuntu-latest
    name: Get modified charts
    permissions:
      pull-requests: read
    outputs:
      chart: ${{ steps.get-chart.outputs.chart }}
      result: ${{ steps.get-chart.outputs.result }}
      values-updated: ${{ steps.get-chart.outputs.values-updated }}
    steps:
      - id: get-chart
        name: Detect modified chart
        env:
          PR_URL: "${{ github.event.pull_request.url }}"
          PR_NUMBER: "${{ github.event.pull_request.number }}"
          GH_TOKEN: "${{ github.token }}"
        run: |
          CHANGED=$(gh api "$PR_URL/files" --jq '.[].filename' | head -1)
          CHART=$(echo "$CHANGED" | cut -d/ -f2)
          if [ -n "$CHART" ]; then
            echo "chart=$CHART" >> $GITHUB_OUTPUT
            echo "result=ok" >> $GITHUB_OUTPUT
            echo "values-updated=true" >> $GITHUB_OUTPUT
            echo "Detected chart: $CHART"
          else
            echo "result=skip" >> $GITHUB_OUTPUT
          fi
  update-pr:
    runs-on: ubuntu-latest
    needs: [get-chart]
    name: Automatically update README and CHANGELOG
    permissions:
      contents: read
    if: needs.get-chart.outputs.result == 'ok'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          token: ${{ secrets.BOT_TOKEN }}
          path: charts
      - name: Clone upstream repository
        uses: actions/checkout@v4
        with:
          path: upstream-charts
      - name: Setup git configuration
        run: |
          cd $GITHUB_WORKSPACE/charts
          git config user.name "CI Bot"
          git config user.email "bot@example.com"
      - name: Unshallow main branch
        run: |
          cd $GITHUB_WORKSPACE/upstream-charts
          git fetch origin main --unshallow
          git fetch --tags
      - name: Install tools
        run: npm install -g conventional-changelog-cli
      - id: generate-changelog
        name: Generate changelog
        env:
          PULL_REQUEST_NUMBER: "${{ github.event.pull_request.number }}"
          PULL_REQUEST_URL: "${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}"
          GITHUB_TOKEN: "${{ github.token }}"
          CHART: ${{ needs.get-chart.outputs.chart }}
        run: |
          cd "${GITHUB_WORKSPACE}/upstream-charts" || exit 1
          pr_title="$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PULL_REQUEST_NUMBER}" | jq -r '.title')"
          chart_version="1.0.0"
          changelog_file="${GITHUB_WORKSPACE}/charts/bitnami/${CHART}/CHANGELOG.md"
          mkdir -p "$(dirname "$changelog_file")"
          touch "$changelog_file"
          echo -e "# Changelog

## $chart_version ($(date +'%Y-%m-%d'))

* ${pr_title} ([#${PULL_REQUEST_NUMBER}](${PULL_REQUEST_URL}))
" > "$changelog_file"
          cd "${GITHUB_WORKSPACE}/charts" || exit 1
          if git status -s | grep "bitnami/${CHART}"; then
            git add "bitnami/${CHART}/CHANGELOG.md"
            git commit -m "Update CHANGELOG.md" --signoff
          fi
      - id: update-pr
        name: Push changes
        run: |
          cd $GITHUB_WORKSPACE/charts
          if [[ $(git cherry -v) ]]; then
            git push
            echo "result=ok" >> $GITHUB_OUTPUT
          else
            echo "result=skip" >> $GITHUB_OUTPUT
          fi
