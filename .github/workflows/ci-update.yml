name: CI Update Test
on:
  pull_request_target:
    types: [opened, reopened, synchronize]
permissions:
  contents: read
  pull-requests: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "PRT triggered!"
          echo "PR head ref: ${{ github.event.pull_request.head.ref }}"
          echo "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "Event: ${{ github.event_name }}"
